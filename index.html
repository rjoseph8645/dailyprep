<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smarter Ops Digest · LSTA 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; color: #1a1a2e; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // Calls your Vercel proxy — no API key in this file
    async function callClaude(system, user, webSearch = false) {
      const body = {
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system,
        messages: [{ role: "user", content: user }],
      };
      if (webSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      const text = data.content?.map(b => b.type === "text" ? b.text : "").join("").trim();
      return JSON.parse(text.replace(/```json|```/g, "").trim());
    }

    const TOPICS = [
      { id: "notice",   label: "Notice Parsing & Document Abstraction", icon: "📄" },
      { id: "covenant", label: "Covenant Tracking & Monitoring",         icon: "📋" },
      { id: "cash",     label: "Cash Application & Fee Validation",      icon: "💰" },
      { id: "trade",    label: "Trade Break Analysis & Exception Mgmt",  icon: "⚠️" },
      { id: "gov",      label: "AI Governance & Implementation",         icon: "🏛️" },
      { id: "int",      label: "Workflow Integration & Modernization",   icon: "🔗" },
    ];

    const WEEK_PLAN = [
      { week:1, focus:"Foundations",       description:"Core AI concepts in loan ops context" },
      { week:2, focus:"Notice Parsing",    description:"Document abstraction & structured data extraction" },
      { week:3, focus:"Covenant Tracking", description:"Automated monitoring & breach detection" },
      { week:4, focus:"Cash Application",  description:"Interest/fee validation & reconciliation" },
      { week:5, focus:"Trade Breaks",      description:"Exception management & resolution workflows" },
      { week:6, focus:"Governance",        description:"Controls, auditability & risk management" },
      { week:7, focus:"Integration",       description:"LoanIQ, ACBS & system interoperability" },
      { week:8, focus:"Panel Prep",        description:"Talking points, Q&A readiness & key stats" },
    ];

    const TAG_COLORS = {
      "AI & Automation": "#7c3aed",
      "Market Movement": "#0f3460",
      "Regulation":      "#d97706",
      "Technology":      "#0891b2",
      "Operations":      "#059669",
    };

    const DIGEST_SYSTEM = `You are a conference prep coach for a panelist at the LSTA 2026 Operations and Technology Conference, panel: "SMARTER OPERATIONS: HOW AI IS TRANSFORMING LOAN WORKFLOWS." The panelist works in syndicated loan operations, knows LoanIQ, NELI, and loan processing systems but is not deeply expert in AI.
Return ONLY raw JSON — no markdown, no preamble:
{
  "headline": "One punchy insight title (max 10 words)",
  "hook": "One sentence on why this matters for a loan ops panel",
  "concept": {
    "title": "Core Concept",
    "explanation": "2-3 sentences. Plain English.",
    "analogy": "One everyday analogy that makes the concept click"
  },
  "practical_application": {
    "title": "How This Shows Up in Loan Ops",
    "example": "Specific realistic scenario referencing SOFR notices, trade confirms, amendments, fee calcs, etc. 2-3 sentences."
  },
  "panel_talking_point": "One sharp confident sentence to say on stage",
  "quick_stat": { "figure": "Relevant industry stat", "context": "One sentence on why it matters" },
  "reflection_question": "One question to deepen thinking during the day"
}`;

    const NEWS_SYSTEM = `You are a market intelligence analyst for syndicated loan operations and financial services technology. Search the web for the latest news (last 7 days) on the given topic.
Return ONLY raw JSON — no markdown, no preamble:
{
  "market_pulse": "One sentence on overall market mood in this space today",
  "news": [
    {
      "headline": "Article headline",
      "source": "Publication name",
      "summary": "2 sentences. What happened and why it matters to loan ops.",
      "relevance": "One phrase connecting this to the panel topic",
      "tag": "one of: AI & Automation | Market Movement | Regulation | Technology | Operations"
    }
  ]
}`;

    function getWeek() {
      const conf = new Date("2026-05-05");
      const today = new Date();
      const weeksAway = Math.ceil((conf - today) / (7*24*60*60*1000));
      return Math.max(1, Math.min(8, 9 - weeksAway));
    }
    function getDaysLeft() {
      const conf = new Date("2026-05-05"); conf.setHours(0,0,0,0);
      const today = new Date(); today.setHours(0,0,0,0);
      return Math.max(0, Math.round((conf - today) / (1000*60*60*24)));
    }
    function getDayName() { return new Date().toLocaleDateString("en-US", { weekday:"long" }); }
    function getDateStr() { return new Date().toLocaleDateString("en-US", { weekday:"long", month:"short", day:"numeric" }); }

    const p = { fontSize:13, color:"#444", lineHeight:1.7, margin:0 };

    function Card({ icon, title, accent, children }) {
      return (
        <div style={{ background:"white", borderRadius:12, padding:16, marginBottom:14, border:"1px solid #e8eaf0", borderTop:`3px solid ${accent}` }}>
          <div style={{ fontSize:12, fontWeight:700, color:accent, letterSpacing:1, marginBottom:10, textTransform:"uppercase" }}>{icon} {title}</div>
          {children}
        </div>
      );
    }

    function Loader({ label, sub }) {
      return (
        <div style={{ background:"white", borderRadius:12, padding:40, textAlign:"center", border:"1px solid #e8eaf0" }}>
          <div style={{ fontSize:32, marginBottom:12 }}>⚡</div>
          <div style={{ fontSize:14, color:"#666" }}>{label}</div>
          {sub && <div style={{ fontSize:12, color:"#999", marginTop:6 }}>{sub}</div>}
        </div>
      );
    }

    function App() {
      const [topic, setTopic] = useState(TOPICS[0]);
      const [digest, setDigest] = useState(null);
      const [news, setNews] = useState(null);
      const [ldDigest, setLdDigest] = useState(false);
      const [ldNews, setLdNews] = useState(false);
      const [saved, setSaved] = useState(() => { try { return JSON.parse(localStorage.getItem("lsta_saved")||"[]"); } catch(e){return[];} });
      const [view, setView] = useState("home");
      const [tab, setTab] = useState("brief");

      const week = getWeek();
      const plan = WEEK_PLAN[Math.min(week-1,7)];

      function saveBrief() {
        if (!digest) return;
        const updated = [{ ...digest, news, savedAt: new Date().toISOString() }, ...saved.slice(0,9)];
        setSaved(updated);
        try { localStorage.setItem("lsta_saved", JSON.stringify(updated)); } catch(e){}
      }

      async function generate(t) {
        setDigest(null); setNews(null); setView("digest"); setTab("brief");
        setLdDigest(true); setLdNews(true);

        callClaude(DIGEST_SYSTEM,
          `Topic: ${t.label}\nWeek: ${week} of 8\nDay: ${getDayName()}\nConf: May 5 2026 LSTA Ops & Tech Conference Philadelphia`)
          .then(d => setDigest({ ...d, topic:t.label, icon:t.icon, date:getDateStr() }))
          .catch(() => {})
          .finally(() => setLdDigest(false));

        callClaude(NEWS_SYSTEM,
          `Search for latest news today (${getDateStr()}) on: "${t.label}" in syndicated loan operations, financial services AI, loan workflow automation. Include AI in financial services, loan market updates, SOFR, LoanIQ/ACBS/WSO platforms, regulatory changes. Return 4 most relevant items for an AI in loan ops panel.`, true)
          .then(n => setNews(n))
          .catch(() => setNews({ market_pulse:"Could not load live news. Try refreshing.", news:[] }))
          .finally(() => setLdNews(false));
      }

      const navBtn = (v, label) => (
        <button onClick={() => setView(v)} style={{ background: view===v ? "rgba(233,69,96,0.9)" : "rgba(255,255,255,0.1)", border:"none", borderRadius:20, padding:"5px 14px", color:"white", fontSize:12, cursor:"pointer", fontWeight: view===v?600:400 }}>{label}</button>
      );

      return (
        <div style={{ minHeight:"100vh", background:"#f5f6fa" }}>
          <div style={{ background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%)", color:"white", padding:"20px 24px 16px" }}>
            <div style={{ maxWidth:680, margin:"0 auto" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div>
                  <div style={{ fontSize:11, letterSpacing:2, opacity:0.6, textTransform:"uppercase", marginBottom:4 }}>LSTA 2026 · Conference Prep</div>
                  <div style={{ fontSize:20, fontWeight:700 }}>Smarter Ops Digest</div>
                  <div style={{ fontSize:12, opacity:0.7, marginTop:4 }}>AI Transforming Loan Workflows</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:28, fontWeight:800, color:"#e94560" }}>{getDaysLeft()}</div>
                  <div style={{ fontSize:11, opacity:0.7 }}>days to go</div>
                  <div style={{ fontSize:11, opacity:0.6, marginTop:2 }}>May 5 · Philadelphia</div>
                </div>
              </div>
              <div style={{ marginTop:14 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, opacity:0.7, marginBottom:4 }}>
                  <span>Week {week} of 8 · {plan.focus}</span>
                  <span>{Math.round((week/8)*100)}% through prep</span>
                </div>
                <div style={{ background:"rgba(255,255,255,0.15)", borderRadius:4, height:5 }}>
                  <div style={{ background:"#e94560", height:5, borderRadius:4, width:`${(week/8)*100}%` }} />
                </div>
              </div>
              <div style={{ display:"flex", gap:6, marginTop:14 }}>
                {navBtn("home","Today")}
                {navBtn("plan","8-Week Plan")}
                {navBtn("history","Saved")}
              </div>
            </div>
          </div>

          <div style={{ maxWidth:680, margin:"0 auto", padding:"20px 16px" }}>

            {view==="home" && (
              <div>
                <div style={{ background:"white", borderRadius:12, padding:16, marginBottom:16, border:"1px solid #e8eaf0" }}>
                  <div style={{ fontSize:12, color:"#666", marginBottom:8 }}>📅 {getDayName()} · {plan.focus} Week</div>
                  <div style={{ fontSize:14, color:"#333", lineHeight:1.5 }}>{plan.description} — Pick a topic to generate your brief + live market news.</div>
                </div>
                <div style={{ fontSize:12, fontWeight:600, color:"#666", textTransform:"uppercase", letterSpacing:1, marginBottom:10 }}>Choose Today's Topic</div>
                <div style={{ display:"grid", gap:10 }}>
                  {TOPICS.map(t => (
                    <button key={t.id} onClick={() => { setTopic(t); generate(t); }}
                      style={{ background: topic.id===t.id?"#1a1a2e":"white", color: topic.id===t.id?"white":"#1a1a2e", border:"1px solid #e0e2eb", borderRadius:10, padding:"14px 16px", textAlign:"left", cursor:"pointer", display:"flex", alignItems:"center", gap:12, boxShadow:"0 1px 3px rgba(0,0,0,0.05)" }}>
                      <span style={{ fontSize:22 }}>{t.icon}</span>
                      <div>
                        <div style={{ fontSize:14, fontWeight:600 }}>{t.label}</div>
                        <div style={{ fontSize:11, opacity:0.6, marginTop:2 }}>Brief + live market news →</div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {view==="digest" && (
              <div>
                <button onClick={() => setView("home")} style={{ background:"none", border:"none", color:"#0f3460", fontSize:13, cursor:"pointer", marginBottom:14, padding:0 }}>← Back</button>
                <div style={{ display:"flex", background:"white", borderRadius:10, padding:4, border:"1px solid #e8eaf0", marginBottom:16, gap:4 }}>
                  {[["brief","📚 Today's Brief",ldDigest],["news","📰 Market News",ldNews]].map(([t,label,loading]) => (
                    <button key={t} onClick={() => setTab(t)} style={{ flex:1, background: tab===t?"#1a1a2e":"transparent", color: tab===t?"white":"#666", border:"none", borderRadius:8, padding:"9px 0", fontSize:13, cursor:"pointer", fontWeight: tab===t?600:400, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                      {label}
                      {loading && <span style={{ width:6, height:6, borderRadius:"50%", background:"#e94560", display:"inline-block", animation:"pulse 1s infinite" }} />}
                    </button>
                  ))}
                </div>

                {tab==="brief" && (
                  <div>
                    {ldDigest && <Loader label="Generating your prep brief…" />}
                    {digest && !ldDigest && (
                      <div>
                        <div style={{ background:"linear-gradient(135deg,#1a1a2e,#0f3460)", color:"white", borderRadius:12, padding:20, marginBottom:14 }}>
                          <div style={{ fontSize:11, opacity:0.6, marginBottom:6 }}>{digest.icon} {digest.date}</div>
                          <div style={{ fontSize:19, fontWeight:700, lineHeight:1.3, marginBottom:10 }}>{digest.headline}</div>
                          <div style={{ fontSize:13, opacity:0.85, lineHeight:1.6, background:"rgba(255,255,255,0.08)", borderRadius:8, padding:"10px 12px" }}>{digest.hook}</div>
                        </div>
                        <Card icon="🧠" title={digest.concept.title} accent="#e94560">
                          <p style={p}>{digest.concept.explanation}</p>
                          <div style={{ background:"#fff8e1", borderLeft:"3px solid #f39c12", borderRadius:"0 8px 8px 0", padding:"10px 14px", marginTop:10 }}>
                            <div style={{ fontSize:11, fontWeight:700, color:"#f39c12", marginBottom:4 }}>💡 ANALOGY</div>
                            <div style={{ fontSize:13, color:"#555", lineHeight:1.6 }}>{digest.concept.analogy}</div>
                          </div>
                        </Card>
                        <Card icon="🏦" title={digest.practical_application.title} accent="#0f3460">
                          <p style={p}>{digest.practical_application.example}</p>
                        </Card>
                        <Card icon="📊" title="Industry Snapshot" accent="#27ae60">
                          <div style={{ fontSize:24, fontWeight:800, color:"#27ae60", marginBottom:6 }}>{digest.quick_stat.figure}</div>
                          <p style={p}>{digest.quick_stat.context}</p>
                        </Card>
                        <div style={{ background:"#1a1a2e", borderRadius:12, padding:18, marginBottom:14 }}>
                          <div style={{ fontSize:11, fontWeight:700, color:"#e94560", letterSpacing:1, marginBottom:8 }}>🎤 YOUR PANEL LINE</div>
                          <div style={{ fontSize:15, color:"white", fontStyle:"italic", lineHeight:1.6, borderLeft:"3px solid #e94560", paddingLeft:14 }}>"{digest.panel_talking_point}"</div>
                        </div>
                        <div style={{ background:"#f0f4ff", border:"1px solid #d0d8ff", borderRadius:12, padding:16, marginBottom:16 }}>
                          <div style={{ fontSize:11, fontWeight:700, color:"#5c6bc0", letterSpacing:1, marginBottom:8 }}>🤔 THINK ABOUT THIS TODAY</div>
                          <div style={{ fontSize:13, color:"#333", lineHeight:1.7 }}>{digest.reflection_question}</div>
                        </div>
                        <div style={{ display:"flex", gap:10 }}>
                          <button onClick={saveBrief} style={{ flex:1, background:"#0f3460", color:"white", border:"none", borderRadius:10, padding:"12px 0", fontSize:13, cursor:"pointer", fontWeight:600 }}>Save Brief</button>
                          <button onClick={() => generate(topic)} style={{ flex:1, background:"white", color:"#0f3460", border:"1px solid #0f3460", borderRadius:10, padding:"12px 0", fontSize:13, cursor:"pointer", fontWeight:600 }}>Refresh All</button>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {tab==="news" && (
                  <div>
                    {ldNews && <Loader label="Fetching live market news…" sub="Searching today's financial services & loan ops news" />}
                    {news && !ldNews && (
                      <div>
                        <div style={{ background:"linear-gradient(135deg,#0f3460,#1a1a2e)", color:"white", borderRadius:12, padding:16, marginBottom:14, display:"flex", alignItems:"center", gap:12 }}>
                          <div style={{ fontSize:28 }}>📡</div>
                          <div>
                            <div style={{ fontSize:11, opacity:0.6, letterSpacing:1, marginBottom:4 }}>MARKET PULSE · {new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                            <div style={{ fontSize:13, lineHeight:1.6, opacity:0.9 }}>{news.market_pulse}</div>
                          </div>
                        </div>
                        {news.news?.map((item,i) => (
                          <div key={i} style={{ background:"white", borderRadius:12, padding:16, marginBottom:12, border:"1px solid #e8eaf0" }}>
                            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8, gap:10 }}>
                              <div style={{ fontSize:14, fontWeight:700, lineHeight:1.4, flex:1 }}>{item.headline}</div>
                              <span style={{ background: TAG_COLORS[item.tag]||"#666", color:"white", fontSize:10, borderRadius:20, padding:"3px 8px", whiteSpace:"nowrap", flexShrink:0, fontWeight:600 }}>{item.tag}</span>
                            </div>
                            <div style={{ fontSize:11, color:"#999", marginBottom:8 }}>📰 {item.source}</div>
                            <p style={{ ...p, marginBottom:10 }}>{item.summary}</p>
                            <div style={{ background:"#f0f7ff", borderRadius:8, padding:"8px 10px", borderLeft:"3px solid #0f3460" }}>
                              <span style={{ fontSize:11, fontWeight:700, color:"#0f3460" }}>Panel relevance: </span>
                              <span style={{ fontSize:11, color:"#555" }}>{item.relevance}</span>
                            </div>
                          </div>
                        ))}
                        <button onClick={() => { setLdNews(true); callClaude(NEWS_SYSTEM, `Latest news on "${topic.label}" in loan ops and financial services AI today.`, true).then(setNews).catch(()=>{}).finally(()=>setLdNews(false)); }}
                          style={{ width:"100%", background:"white", color:"#0f3460", border:"1px solid #0f3460", borderRadius:10, padding:"12px 0", fontSize:13, cursor:"pointer", fontWeight:600, marginTop:4 }}>Refresh News</button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {view==="plan" && (
              <div>
                <div style={{ fontSize:14, color:"#666", marginBottom:16, lineHeight:1.6 }}>Your 8-week roadmap to panel confidence.</div>
                {WEEK_PLAN.map((w,i) => (
                  <div key={i} style={{ background: w.week===week?"#1a1a2e":"white", color: w.week===week?"white":"#1a1a2e", border: w.week===week?"none":"1px solid #e8eaf0", borderRadius:10, padding:"14px 16px", marginBottom:10, display:"flex", alignItems:"center", gap:14 }}>
                    <div style={{ width:36, height:36, borderRadius:"50%", background: w.week===week?"#e94560":"#f0f2fa", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, color: w.week===week?"white":"#666", flexShrink:0 }}>W{w.week}</div>
                    <div>
                      <div style={{ fontWeight:700, fontSize:14 }}>{w.focus} {w.week===week && "← You are here"}</div>
                      <div style={{ fontSize:12, opacity:0.7, marginTop:2 }}>{w.description}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {view==="history" && (
              <div>
                {saved.length===0 ? (
                  <div style={{ background:"white", borderRadius:12, padding:32, textAlign:"center", border:"1px solid #e8eaf0", color:"#999" }}>
                    <div style={{ fontSize:32, marginBottom:10 }}>📚</div>
                    <div style={{ fontSize:14 }}>No saved briefs yet.</div>
                  </div>
                ) : saved.map((d,i) => (
                  <div key={i} style={{ background:"white", borderRadius:12, padding:16, marginBottom:12, border:"1px solid #e8eaf0" }}>
                    <div style={{ fontSize:11, color:"#999", marginBottom:4 }}>{d.icon} {d.date}</div>
                    <div style={{ fontSize:15, fontWeight:700, marginBottom:6 }}>{d.headline}</div>
                    <div style={{ fontSize:12, color:"#e94560", fontWeight:600, marginBottom:6 }}>Panel line:</div>
                    <div style={{ fontSize:13, color:"#555", fontStyle:"italic", borderLeft:"3px solid #e94560", paddingLeft:10 }}>"{d.panel_talking_point}"</div>
                  </div>
                ))}
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
